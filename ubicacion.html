<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>LuxDetailing Center | Ubicación</title>
  <meta name="description" content="Ubicación, ruta y acceso a Google Maps y Waze.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="ubicacion">

<main>
  <section>
    <div class="container">
      <span class="section-kicker">Cómo llegar</span>
      <h1 class="section-title">Ubicación.</h1>
      <p class="section-subtitle">
        Ubícanos y elige la mejor ruta con Google Maps o Waze.
      </p>

      <div id="ubi-status" class="alert alert-info py-2 px-3 small mb-3">
        Intentando obtener tu ubicación actual...
      </div>

      <div class="row g-4">
        <div class="col-lg-8">
          <div class="map-wrap">
            <div id="map"></div>
          </div>
        </div>

        <div class="col-lg-4">
          <article class="location-panel">
            <div class="card-body">
              <h2 class="h4 fw-bold mb-3">Ruta más cercana</h2>
              <p class="text-secondary">
                Usa tu ubicación actual como origen si autorizas permisos del navegador.
              </p>

              <div class="d-grid gap-2">
                <button id="btn-geo" type="button" class="btn btn-outline-brand btn-icon">
                  <i class="bi bi-crosshair"></i>
                  Usar mi ubicación
                </button>

                <a id="btnGMaps" class="btn btn-brand btn-icon" target="_blank" rel="noopener">
                  <span class="icon-svg">
                    <svg viewBox="0 0 64 64" fill="none" aria-hidden="true">
                      <path d="M32 58C32 58 50 42.8 50 25C50 15.1 42.2 7 32 7C21.8 7 14 15.1 14 25C14 42.8 32 58 32 58Z" fill="#EA4335"/>
                      <path d="M25.5 10.7L18.1 30.2L24.6 33L31.9 13.5L25.5 10.7Z" fill="#4285F4"/>
                      <path d="M31.9 13.5L24.6 33L32.4 36.1L39.6 16.7L31.9 13.5Z" fill="#FBBC04"/>
                      <path d="M39.6 16.7L32.4 36.1L39.8 39.1L47 19.6L39.6 16.7Z" fill="#34A853"/>
                      <circle cx="32" cy="25" r="7.5" fill="white"/>
                      <circle cx="32" cy="25" r="3.5" fill="#4285F4"/>
                    </svg>
                  </span>
                  Abrir en Google Maps
                </a>

                <a id="btnWaze" class="btn btn-darksoft btn-icon" target="_blank" rel="noopener">
                  <span class="icon-svg">
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                      <path d="M12.2 3.2c-5 0-9.1 3.7-9.1 8.4 0 2.8 1.4 5.3 3.6 6.8l-.9 2.1 3-.7c1 .2 2.1.3 3.2.3 5 0 9.1-3.7 9.1-8.4s-4.1-8.5-8.9-8.5Z" fill="#fff"/>
                      <path d="M12.2 3.2c-5 0-9.1 3.7-9.1 8.4 0 2.8 1.4 5.3 3.6 6.8l-.9 2.1 3-.7c1 .2 2.1.3 3.2.3 5 0 9.1-3.7 9.1-8.4s-4.1-8.5-8.9-8.5Z" stroke="#05C8F7" stroke-width="1.6"/>
                      <circle cx="9.1" cy="10.2" r="1" fill="#0f1319"/>
                      <circle cx="14.7" cy="10.2" r="1" fill="#0f1319"/>
                      <path d="M9.8 13.2c.6.7 1.5 1.1 2.5 1.1 1 0 1.9-.4 2.5-1.1" stroke="#0f1319" stroke-width="1.5" stroke-linecap="round"/>
                      <circle cx="8.1" cy="18.3" r="1.7" fill="#0f1319"/>
                      <circle cx="16.6" cy="18.3" r="1.7" fill="#0f1319"/>
                    </svg>
                  </span>
                  Abrir en Waze
                </a>
              </div>

              <hr>

              <div id="panelRuta" class="text-secondary small">Aquí aparecerá la distancia y tiempo aproximado.</div>
            </div>
          </article>
        </div>
      </div>
    </div>
  </section>
</main>

<script src="tools/config.js"></script>
<script src="js/site.js"></script>
<script src="js/location.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
